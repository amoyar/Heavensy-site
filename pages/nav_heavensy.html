<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nav — Heavensy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #4B5EA3; }

/* ── HEAVENSY NAV ── */
.hv-nav {
  position: sticky; top: 0; z-index: 1000;
  height: 54px;
  background: rgba(70, 90, 180, 0.96);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(150, 175, 255, 0.16);
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  box-shadow: 0 2px 20px rgba(10, 20, 70, 0.4);
}

/* Brand */
.hv-nav-brand {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; flex-shrink: 0;
}
.hv-nav-logo {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #9961FF 0%, #5b8dee 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 2px 10px rgba(153, 97, 255, 0.4);
}
.hv-nav-name {
  font-size: 16px; font-weight: 400; color: #fff;
  font-family: 'Poppins', sans-serif; letter-spacing: .2px;
}

/* Center links */
.hv-nav-links {
  display: flex; align-items: center; gap: 6px;
  margin: 0 auto;
}
.hv-nav-link {
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.78);
  text-decoration: none; padding: 4px 12px;
  border-radius: 6px;
  transition: background .2s, color .2s;
  white-space: nowrap;
}
.hv-nav-link:hover { background: rgba(255,255,255,0.10); color: #fff; }

/* Right section */
.hv-nav-right {
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}

/* Bell */
.hv-nav-bell {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: rgba(255,255,255,0.75);
  flex-shrink: 0;
}
.hv-nav-bell:hover { color: #fff; }
.hv-nav-bell-dot {
  position: absolute; top: -6px; right: -6px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #9961FF;
  border: 1.5px solid rgba(70, 90, 180, 0.96);
  font-size: 9px; font-weight: 700; color: #fff;
  font-family: Arial, sans-serif;
  display: grid; place-items: center;
  line-height: 0;
}

/* Status */
.hv-nav-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.72);
  white-space: nowrap;
}
.hv-nav-status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4ADE80;
  box-shadow: 0 0 7px rgba(74, 222, 128, 0.8);
  flex-shrink: 0;
}

/* Divider */
.hv-nav-divider {
  width: 1px; height: 22px;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}

/* User */
.hv-nav-user {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; padding: 3px 0 3px 4px;
  border-radius: 22px;
  transition: background .2s;
}
.hv-nav-user:hover { background: rgba(255,255,255,0.09); }
.hv-nav-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, #9961FF, #5b8dee);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  flex-shrink: 0; overflow: hidden;
  border: 1.5px solid rgba(255,255,255,0.25);
}
.hv-nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
.hv-nav-user-name {
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,0.88);
  white-space: nowrap;
}
.hv-nav-chevron { color: rgba(255,255,255,0.45); flex-shrink: 0; transition: transform .2s; }
.hv-nav-user.open .hv-nav-chevron { transform: rotate(180deg); }

/* Dropdown */
.hv-nav-user-wrap { position: relative; }
.hv-nav-dropdown {
  display: none; position: absolute; top: calc(100% + 10px); right: 0;
  background: rgba(30, 40, 105, 0.97);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(150,175,255,0.2);
  border-radius: 12px; min-width: 170px;
  box-shadow: 0 8px 28px rgba(10,20,80,0.45);
  overflow: hidden; z-index: 2000;
}
.hv-nav-dropdown.open { display: block; }
.hv-nav-dropdown a {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px;
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85);
  text-decoration: none; transition: background .15s;
  font-family: 'Poppins', sans-serif;
}
.hv-nav-dropdown a:hover { background: rgba(255,255,255,0.09); color: #fff; }
.hv-nav-dropdown a.danger { color: rgba(255,100,100,0.85); }
.hv-nav-dropdown a.danger:hover { background: rgba(255,80,80,0.1); color: #ff7070; }
.hv-nav-dropdown-sep { height: 1px; background: rgba(150,175,255,0.15); margin: 4px 0; }

/* Mobile */
@media (max-width: 600px) {
  .hv-nav { padding: 0 14px; gap: 10px; }
  .hv-nav-search { max-width: none; }
  .hv-nav-status { display: none; }
  .hv-nav-divider { display: none; }
  .hv-nav-link { padding: 5px 10px; font-size: 11.5px; }
  .hv-nav-user-name { display: none; }
}
</style>
</head>
<body>

<nav class="hv-nav">

  <!-- Logo + nombre -->
  <a class="hv-nav-brand" href="#">
    <div class="hv-nav-logo"><img src="LOGOFINAL.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
    <span class="hv-nav-name">Heavensy</span>
  </a>

  <!-- Links centro -->
  <div class="hv-nav-links">
    <a class="hv-nav-link" href="#">Planes</a>
    <a class="hv-nav-link" href="busqueda_heavensy.html">Buscar servicios</a>
  </div>

  <!-- Derecha -->
  <div class="hv-nav-right">

    <!-- Campanita -->
    <div class="hv-nav-bell">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="hv-nav-bell-dot">3</span>
    </div>

    <div class="hv-nav-divider"></div>

    <!-- IA activa -->
    <div class="hv-nav-status">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4ADE80" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 5px rgba(74,222,128,0.7))"><polyline points="20 6 9 17 4 12"/></svg>
      IA
    </div>

    <!-- Usuario -->
    <div class="hv-nav-user-wrap">
    <div class="hv-nav-user" onclick="toggleUserMenu()">
      <div class="hv-nav-avatar" id="nav-avatar">U</div>
      <span class="hv-nav-user-name" id="nav-username">Usuario</span>
      <svg class="hv-nav-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="hv-nav-dropdown" id="user-dropdown">
      <a href="../index.html#perfil_personal_interno">Mi Perfil</a>
      <a href="../index.html#configuracion">Mi empresa</a>
      <div class="hv-nav-dropdown-sep"></div>
      <a href="#" class="danger" onclick="localStorage.clear();sessionStorage.clear();location.reload();return false;">Cerrar sesión</a>
    </div>
    </div>

  </div>
</nav>

<script>
function toggleUserMenu() {
  const user = document.querySelector('.hv-nav-user');
  const dd = document.getElementById('user-dropdown');
  const open = !dd.classList.contains('open');
  dd.classList.toggle('open', open);
  user.classList.toggle('open', open);
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.hv-nav-user-wrap')) {
    document.getElementById('user-dropdown').classList.remove('open');
    document.querySelector('.hv-nav-user').classList.remove('open');
  }
});
</script>

</body>
</html>
