<div class="relative">

    id="searchConversations"
    placeholder="Buscar contacto..."
    class="w-full pl-9 pr-7 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm transition-all"
    style="outline:none;"
    onfocus="this.style.borderColor='#7D84C1';this.style.boxShadow='0 0 0 2px #C9D9FF';document.getElementById('searchClearBtn').style.display=this.value?'flex':'none';"
    onblur="this.style.borderColor='#e5e7eb';this.style.boxShadow='none';"
    oninput="document.getElementById('searchClearBtn').style.display=this.value?'flex':'none';"
  />
  <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
  <button id="searchClearBtn"
    style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;align-items:center;justify-content:center;padding:0;font-size:11px;"
    onclick="document.getElementById('searchConversations').value='';this.style.display='none';document.getElementById('searchConversations').dispatchEvent(new Event('input'));document.getElementById('searchConversations').focus();">

</div>

<div id="quickRepliesPanel"

      <button id="qrCloseBtn" class="text-gray-400 hover:text-gray-600">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <!-- Botones abrir/cerrar formulario -->
  <div class="px-4 py-2 border-b border-gray-100 flex items-center justify-between">
    <button id="qrOpenFormBtn"
      onclick="document.getElementById('qrFormWrapper').classList.remove('hidden'); document.getElementById('qrOpenFormBtn').classList.add('hidden'); document.getElementById('qrCloseFormBtn').classList.remove('hidden');"
      class="flex items-center gap-1.5 text-xs text-purple-600 hover:text-purple-800 font-medium transition">
      <i class="fas fa-plus text-[10px]"></i> Nueva respuesta
    </button>
    <button id="qrCloseFormBtn"
      onclick="document.getElementById('qrFormWrapper').classList.add('hidden'); document.getElementById('qrCloseFormBtn').classList.add('hidden'); document.getElementById('qrOpenFormBtn').classList.remove('hidden');"
      class="hidden flex items-center gap-1.5 text-xs text-purple-600 hover:text-purple-800 font-medium transition">
      <i class="fas fa-times text-[10px]"></i> Cerrar
    </button>
  </div>

  <!-- Formulario (oculto por defecto) -->
  <div id="qrFormWrapper" class="hidden px-4 py-3 border-b border-gray-100 bg-gray-50">
    <!-- Fila 1: shortcut + categoría -->
    <div class="grid grid-cols-2 gap-2 mb-2">
      <input id="qrFormShortcut" type="text" placeholder="/hola"
        class="px-2 py-1 border border-gray-300 rounded-lg text-xs" />
      <div class="relative">
        <input id="qrFormCategory" type="text" placeholder="Selecciona Categoría o Ingresa nueva..." list="qrCategoryList" autocomplete="off"
          class="w-full px-2 py-1 border border-gray-300 rounded-lg text-xs" />
        <datalist id="qrCategoryList"></datalist>
      </div>
    </div>

    <!-- Fila 2: toolbar de formato WA -->
    <div class="flex items-center gap-1 mb-1 px-1">
      <span class="text-[10px] text-gray-400 mr-1">Formato WA:</span>
      <button type="button" onclick="qrFormatWrap('*')"
        class="w-6 h-6 flex items-center justify-center rounded text-xs font-bold text-gray-600 hover:bg-gray-200 transition" title="Negrita (*texto*)">B</button>
      <button type="button" onclick="qrFormatWrap('_')"
        class="w-6 h-6 flex items-center justify-center rounded text-xs italic text-gray-600 hover:bg-gray-200 transition" title="Cursiva (_texto_)">I</button>
      <button type="button" onclick="qrFormatWrap('~')"
        class="w-6 h-6 flex items-center justify-center rounded text-xs line-through text-gray-600 hover:bg-gray-200 transition" title="Tachado (~texto~)">S</button>
      <button type="button" onclick="qrFormatInsertNewline()"
        class="w-6 h-6 flex items-center justify-center rounded text-xs text-gray-600 hover:bg-gray-200 transition" title="Salto de línea">↵</button>
    </div>

    <!-- Fila 3: textarea -->
    <textarea id="qrFormText" rows="3" placeholder="Texto de la respuesta... (selecciona texto y usa los botones de formato)"
      class="w-full px-2 py-1 border border-gray-300 rounded-lg text-xs resize-none focus:outline-none focus:border-purple-400"></textarea>

    <div class="flex items-center justify-between mt-2">
      <div class="text-[11px] text-gray-400" id="qrFormModeLabel">Modo: Crear</div>
      <div class="flex gap-2">
        <button id="qrFormCancelBtn"
          onclick="document.getElementById('qrFormWrapper').classList.add('hidden'); document.getElementById('qrCloseFormBtn').classList.add('hidden'); document.getElementById('qrOpenFormBtn').classList.remove('hidden');"
          class="px-3 py-1 text-xs rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100">
          Cancelar
        </button>
        <button id="qrFormSaveBtn"
          class="px-3 py-1 text-xs rounded-lg bg-purple-600 text-white hover:bg-purple-700">
          Guardar
        </button>
      </div>
    </div>
  </div>
