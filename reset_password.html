<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña — Heavensy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #bbbfff 0%, #9db8f0 50%, #78ade5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,.15);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.8rem;
        }
        .logo img { width: 40px; height: 40px; object-fit: contain; }
        .logo span { font-size: 1.2rem; font-weight: 400; color: #374151; letter-spacing: 1px; }
        h2 { font-size: 1.3rem; font-weight: 700; color: #111827; margin-bottom: .3rem; }
        p.sub { font-size: .85rem; color: #6b7280; margin-bottom: 1.5rem; line-height: 1.5; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: .8rem; font-weight: 600; color: #374151; margin-bottom: .35rem; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #78ade5; pointer-events: none; }
        .form-input {
            width: 100%; padding: 10px 36px 10px 34px;
            border: 1.5px solid #e5e7eb; border-radius: 8px;
            font-size: .875rem; color: #111827; background: #f9fafb;
            outline: none; transition: border-color .15s, box-shadow .15s;
        }
        .form-input:focus { border-color: #78ade5; background: #fff; box-shadow: 0 0 0 3px rgba(120,173,229,.15); }
        .eye-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 12px;
            padding: 4px; display: flex; align-items: center; z-index: 3;
        }
        .eye-btn:hover { color: #78ade5; }
        .input-wrap input[type="password"],
        .input-wrap input[type="text"] { padding-right: 36px; box-sizing: border-box; }
        .btn {
            width: 100%; padding: 11px; background: #78ade5; color: #fff;
            border: none; border-radius: 8px; font-size: .9rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 8px; transition: background .15s, transform .1s;
            box-shadow: 0 4px 12px rgba(120,173,229,.4); margin-top: .5rem;
        }
        .btn:hover:not(:disabled) { background: #5e9fd8; }
        .btn:disabled { opacity: .7; cursor: default; }
        .btn.success { background: #16a34a; }
        .msg {
            display: none; padding: 10px 14px; border-radius: 8px;
            font-size: .82rem; margin-bottom: 1rem;
            align-items: center; gap: 8px;
        }
        .msg.error  { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
        .msg.success-msg { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .msg.show   { display: flex; }
        .back-link { display: block; text-align: center; margin-top: 1.2rem; font-size: .82rem; color: #78ade5; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .expired { text-align: center; padding: 1rem 0; }
        .expired i { font-size: 2.5rem; color: #fca5a5; margin-bottom: .8rem; display: block; }
        .expired p { color: #6b7280; font-size: .875rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <img src="assets/img/heavensy-logo.png" alt="">
        <span>Heavensy</span>
    </div>

    <div id="loadingState" style="text-align:center;padding:1rem 0;color:#6b7280;font-size:.875rem;">
        <i class="fas fa-spinner fa-spin" style="margin-right:6px;color:#78ade5;"></i>
        Validando enlace...
    </div>

    <div id="expiredState" class="expired" style="display:none;">
        <i class="fas fa-clock"></i>
        <h2 style="margin-bottom:.5rem;">Enlace expirado</h2>
        <p>Este enlace ya fue usado o expiró. Solicita uno nuevo.</p>
        <a href="login.html" class="back-link" style="margin-top:1rem;display:inline-block;">
            Volver al login
        </a>
    </div>

    <div id="resetForm" style="display:none;">
        <h2>Nueva contraseña</h2>
        <p class="sub">Ingresa tu nueva contraseña. Debe tener al menos 8 caracteres.</p>

        <div class="msg error" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>
        <div class="msg success-msg" id="successMsg">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>

        <div class="form-group">
            <label class="form-label">Nueva contraseña</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" id="newPassword" class="form-input" placeholder="Mínimo 8 caracteres">
                <button type="button" class="eye-btn" onclick="togglePw('newPassword','icon1')">
                    <i id="icon1" class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Confirmar contraseña</label>
            <div class="input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Repite la contraseña">
                <button type="button" class="eye-btn" onclick="togglePw('confirmPassword','icon2')">
                    <i id="icon2" class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <button class="btn" id="resetBtn" onclick="doReset()">
            <i class="fas fa-key"></i>
            <span>Restablecer contraseña</span>
        </button>

        <a href="login.html" class="back-link">
            <i class="fas fa-arrow-left" style="font-size:10px;margin-right:4px;"></i>
            Volver al login
        </a>
    </div>
</div>

<script>
const API = 'https://heavensy-api-backend-v2.onrender.com';
const token = new URLSearchParams(window.location.search).get('token');

function togglePw(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
}

async function validateToken() {
    if (!token) { showExpired(); return; }
    try {
        const res = await fetch(`${API}/api/auth/validate-reset-token?token=${token}`);
        const data = await res.json();
        if (data.valid) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('resetForm').style.display = 'block';
        } else {
            showExpired();
        }
    } catch(e) {
        showExpired();
    }
}

function showExpired() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('expiredState').style.display = 'block';
}

async function doReset() {
    const np = document.getElementById('newPassword').value;
    const cp = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('resetBtn');
    const errBox = document.getElementById('errorMsg');
    const errText = document.getElementById('errorText');
    const okBox = document.getElementById('successMsg');
    const okText = document.getElementById('successText');

    errBox.classList.remove('show');
    okBox.classList.remove('show');

    if (np.length < 8) {
        errText.textContent = 'La contraseña debe tener al menos 8 caracteres';
        errBox.classList.add('show'); return;
    }
    if (np !== cp) {
        errText.textContent = 'Las contraseñas no coinciden';
        errBox.classList.add('show'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Guardando...</span>';

    try {
        const res = await fetch(`${API}/api/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: np })
        });
        const data = await res.json();

        if (data.ok) {
            btn.classList.add('success');
            btn.innerHTML = '<i class="fas fa-check"></i><span>¡Contraseña restablecida!</span>';
            okText.textContent = 'Contraseña actualizada. Redirigiendo al login...';
            okBox.classList.add('show');
            setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        } else {
            throw new Error(data.error || 'Error al restablecer');
        }
    } catch(err) {
        errText.textContent = err.message;
        errBox.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-key"></i><span>Restablecer contraseña</span>';
    }
}

validateToken();
</script>
</body>
</html>
