<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Heavensy</title>
  <script>
    // Si tiene token válido → app, si no → landing
    (function() {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.replace('./app/index.html');
      } else {
        window.location.replace('./landing.html');
      }
    })();
  </script>
</head>
<body></body>
</html>
